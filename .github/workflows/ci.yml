name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          # No third-party deps, so no go.sum and nothing to cache.
          cache: false

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          # go.sum is absent because miniscram has no third-party deps.
          git diff --exit-code go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...
