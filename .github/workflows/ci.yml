name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          # No third-party deps, so no go.sum and nothing to cache.
          cache: false

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          # go.sum is absent because miniscram has no third-party deps.
          git diff --exit-code go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

  gui:
    name: build miniscram-gui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/miniscram-gui/go.mod
          cache: true
          cache-dependency-path: tools/miniscram-gui/go.sum

      - name: Install GUI build deps (X11 + GL + Wayland + Vulkan)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libx11-dev libx11-xcb-dev libxcursor-dev libxrandr-dev \
            libxinerama-dev libxi-dev libxxf86vm-dev libxfixes-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libgl1-mesa-dev libegl-dev libwayland-dev libvulkan-dev \
            pkg-config

      - name: Build
        working-directory: tools/miniscram-gui
        run: go build .

      - name: Vet
        working-directory: tools/miniscram-gui
        run: go vet ./...
